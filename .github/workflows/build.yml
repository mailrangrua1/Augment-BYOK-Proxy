name: Build & Update VSIX

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  build-vsix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build modified VSIX
        id: build
        run: |
          set -euo pipefail
          python3 scripts/repack_vsix.py --force
          VSIX_FILE=$(ls dist/augment-vscode-modified-v*.vsix | head -1)
          VERSION=$(basename "$VSIX_FILE" | grep -oP 'v\K[0-9]+\.[0-9]+\.[0-9]+')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "vsix_file=$VSIX_FILE" >> "$GITHUB_OUTPUT"
          echo "✓ Built: $VSIX_FILE"

      - name: Commit and Push VSIX to current commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          VSIX_FILE=$(ls dist/augment-vscode-modified-v*.vsix | head -1)
          VSIX_NAME=$(basename "$VSIX_FILE")

          git add "$VSIX_FILE"
          git commit -m "chore: add Windows VSIX - $VSIX_NAME" || echo "No changes to commit"
          git push
