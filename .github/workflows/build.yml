name: Auto Build & Release Modified VSIX

permissions:
  contents: write

on:
  # Check Marketplace for new version every 6 hours
  schedule:
    - cron: "0 */6 * * *"
  # Also trigger on push to main (e.g. inject code updates)
  push:
    branches: [main]
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      force_build:
        description: "Skip version check, force rebuild"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

concurrency:
  group: auto-build-release
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────
jobs:

  # ── 1. Check Marketplace version vs existing GitHub Releases ──
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.decide.outputs.should_build }}
      marketplace_version: ${{ steps.query.outputs.version }}
    steps:
      - name: Query Marketplace latest version
        id: query
        run: |
          set -euo pipefail
          PAYLOAD='{"filters":[{"criteria":[{"filterType":7,"value":"augment.vscode-augment"}],"pageNumber":1,"pageSize":1}],"flags":914}'
          RESP=$(curl -sf -X POST \
            -H "Content-Type: application/json" \
            -H "Accept: application/json;api-version=6.0-preview.1" \
            -d "$PAYLOAD" \
            "https://marketplace.visualstudio.com/_apis/public/gallery/extensionquery")

          VERSION=$(echo "$RESP" | jq -r '.results[0].extensions[0].versions[0].version // empty')
          if [ -z "$VERSION" ]; then
            echo "::error::Failed to query version from Marketplace API"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "✓ Marketplace version: $VERSION"

      - name: Compare with existing releases
        id: decide
        env:
          GH_TOKEN: ${{ github.token }}
          FORCE: ${{ inputs.force_build || 'false' }}
          MKT_VERSION: ${{ steps.query.outputs.version }}
        run: |
          set -euo pipefail
          TAG="vsix-v${MKT_VERSION}"

          if [ "$FORCE" = "true" ]; then
            echo "⚡ Force build requested"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check if this version tag already exists on GitHub
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG}")

          if [ "$HTTP" = "200" ]; then
            echo "✓ Release ${TAG} already exists → skip build"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "✓ Release ${TAG} not found → will build"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  # ── 2. Build injected VSIX ────────────────────────────────
  build-vsix:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.repack.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build modified VSIX (repack_vsix.py)
        id: repack
        run: |
          set -euo pipefail
          python3 scripts/repack_vsix.py --force
          # Extract version from output filename
          VSIX_FILE=$(ls dist/augment-vscode-modified-v*.vsix | head -1)
          VERSION=$(echo "$VSIX_FILE" | grep -oP 'v\K[0-9]+\.[0-9]+\.[0-9]+')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "vsix_file=$VSIX_FILE" >> "$GITHUB_OUTPUT"
          echo "✓ Built: $VSIX_FILE (v$VERSION)"

      - name: Generate SHA256
        run: |
          cd dist
          for f in *.vsix; do
            sha256sum "$f" | awk '{print $1}' > "${f}.sha256"
          done

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: modified-vsix
          path: |
            dist/*.vsix
            dist/*.sha256
          retention-days: 30

  # ── 3. Create GitHub Release (versioned + rolling) ────────
  release:
    name: GitHub Release
    needs: [check-version, build-vsix]
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.build-vsix.outputs.version }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lhR dist

      # ── 3a. Versioned release (vsix-v0.840.7) ──
      - name: Create versioned release
        uses: ncipollo/release-action@v1
        with:
          tag: "vsix-v${{ env.VERSION }}"
          name: "Modified VSIX v${{ env.VERSION }}"
          prerelease: false
          allowUpdates: false
          skipIfReleaseExists: true
          body: |
            ## 🚀 Auto-built when new Marketplace version detected

            **VSIX Version:** `v${{ env.VERSION }}` (from `augment.vscode-augment`)
            **Commit:** `${{ github.sha }}`
            **Build:** `${{ github.run_id }}`

            ### 📦 What's included
            - `augment-vscode-modified-v${{ env.VERSION }}.vsix` — Extension with injected BYOK Proxy Panel + Auth Header + Interceptor

            ### 📥 Installation
            1. Download the `.vsix` file below
            2. VS Code → Extensions → `⋯` → **Install from VSIX…**
            3. Select the downloaded file
          artifacts: |
            dist/*.vsix
            dist/*.vsix.sha256

      # ── 3b. Rolling release (always points to latest) ──
      - name: Update rolling release
        uses: ncipollo/release-action@v1
        with:
          tag: rolling
          name: "Rolling — Latest (v${{ env.VERSION }})"
          prerelease: true
          allowUpdates: true
          replacesArtifacts: true
          body: |
            ⚡ **Latest build** — automatically updated when a new Marketplace version is detected.

            - **VSIX:** `augment.vscode-augment` v${{ env.VERSION }}
            - **Commit:** ${{ github.sha }}

            > For a specific version, check [Releases](../../releases) for `vsix-v*` tags.
          artifacts: |
            dist/*.vsix
            dist/*.vsix.sha256
